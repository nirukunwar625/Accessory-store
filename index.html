<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessory Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
        }
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .hero {
            text-align: center;
            padding: 50px;
            background: #eee;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        .product h3 {
            margin: 10px 0;
        }
        .product button {
            padding: 10px 15px;
            border: none;
            background: #222;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .product button:hover {
            background: #555;
        }
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Stylish Accessories</h1>
    <p>Your Fashion, Your Style</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Discover Trendy Accessories</h2>
    <p>Watches, Bags, Sunglasses & More</p>
</section>

<section class="products">
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Watch">
        <h3>Luxury Watch</h3>
        <p>$49.99</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Sunglasses">
        <h3>Sunglasses</h3>
        <p>$19.99</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Bag">
        <h3>Leather Bag</h3>
        <p>$79.99</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Bracelet">
        <h3>Bracelet</h3>
        <p>$14.99</p>
        <button>Buy Now</button>
    </div>
</section>

<footer>
    <p>© 2026 Stylish Accessories | All Rights Reserved</p>
</footer>

</body>
</html>
